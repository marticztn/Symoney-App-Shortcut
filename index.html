<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symoney Quick Guide</title>
    <style>
        :root {
            --primary: #3b82f6;
            --text: #334155;
            --background: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        
        .language-selector {
            margin-bottom: 1.5rem;
        }
        
        .language-selector button {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            padding: 0.5rem 1rem;
            margin: 0 0.25rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .language-selector button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .language-selector button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .card {
            background: var(--card);
            max-width: 36rem;
            width: 100%;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 2rem;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text);
            text-align: center;
        }
        
        ol {
            list-style-position: inside;
            margin-bottom: 1.5rem;
        }
        
        ol > li {
            margin-bottom: 1rem;
            padding-left: 0.5rem;
        }
        
        ul {
            list-style-type: none;
            margin: 0.75rem 0 0.75rem 1.5rem;
        }
        
        ul > li {
            margin-bottom: 0.5rem;
            position: relative;
        }
        
        ul > li:before {
            content: "•";
            color: var(--primary);
            font-weight: bold;
            display: inline-block;
            width: 1rem;
            margin-left: -1rem;
        }
        
        a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.5rem 0;
        }
        
        .note {
            font-size: 0.875rem;
            text-align: center;
            color: var(--text);
            opacity: 0.8;
        }
    </style>
    <script>
        const translations = {
          "en": {
            "title": "Symoney Quick Record Guide",
            "step1": "Get shortcuts:",
            "shortcut1Text": "Quick Record (OCR Assistive)",
            "shortcut2Text": "Smart Quick Record (Smart Recognition)",
            "noteSmart": "(available for Symoney+ subscribers only)",
            "step2": "Open iOS Settings.",
            "step3": "Go to Accessibility.",
            "step4": "Tap Touch.",
            "step5": "Scroll to the bottom and tap Back Tap.",
            "step6": "Tap Double Tap.",
            "step7": "Scroll to the bottom to find the shortcut you just downloaded.",
            "step8": "Configuration complete. Now you can quickly record by double-tapping the back of your phone.",
            "actionNote": "Users with an Action Button (iPhone 15 Pro and above) can also set the shortcut to the Action Button."
          },
          "zh-cn": {
            "title": "简钱 Symoney™ - 快速记账指南",
            "step1": "获取快捷指令：",
            "shortcut1Text": "「快速记账 (OCR 识别)」",
            "shortcut2Text": "「智能快速记账 (智能识别)」",
            "noteSmart": "（仅「简钱+」订阅用户可用）",
            "step2": "打开iOS「设置」。",
            "step3": "进入「辅助功能」。",
            "step4": "点击「触控」。",
            "step5": "滑到最下面，点击「轻点背面」。",
            "step6": "点击「轻点两下」。",
            "step7": "滑动到最下面找到刚才下载的快捷指令。",
            "step8": "配置完成，现在您可以通过敲击手机背部两下来进行快速记账了。",
            "actionNote": "有 Action Button 的用户也可以将快捷指令设置到 Action Button 上去（iPhone 15 Pro 及以上）。"
          },
          "zh-tw": {
            "title": "簡錢 Symoney™ - 快速記帳指南",
            "step1": "獲取捷徑：",
            "shortcut1Text": "「快速記帳 (OCR 辨識)」",
            "shortcut2Text": "「智能快速記帳 (智慧辨識)」",
            "noteSmart": "（僅「簡錢+」訂閱用戶可用）",
            "step2": "打開 iOS「設置」。",
            "step3": "進入「輔助功能」。",
            "step4": "點擊「觸控」。",
            "step5": "滑到最下面，點擊「輕點背面」。",
            "step6": "點擊「輕點兩下」。",
            "step7": "滑動到最下面找到剛才下載的捷徑。",
            "step8": "配置完成，現在您可以通過敲擊手機背部兩下來進行快速記帳了。",
            "actionNote": "具有 Action Button（iPhone 15 Pro 及以上機型）的使用者，也可以將此捷徑設定到 Action Button。"
          }
        };

        function changeLanguage(lang) {
          const dict = translations[lang];
          
          // Update text translations
          document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (dict[key]) {
              el.textContent = dict[key];
            }
          });
          
          // Update active language button
          document.querySelectorAll('.language-selector button').forEach(button => {
            button.classList.remove('active');
          });
          document.querySelector(`.language-selector button[onclick="changeLanguage('${lang}')"]`).classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
          changeLanguage('zh-cn');
        });
    </script>
</head>
<body>
    <div class="language-selector">
        <button onclick="changeLanguage('en')">English</button>
        <button onclick="changeLanguage('zh-cn')" class="active">简体中文</button>
        <button onclick="changeLanguage('zh-tw')">繁體中文</button>
    </div>

    <div class="card">
        <h1 data-i18n="title"></h1>
        <ol>
            <li>
                <span data-i18n="step1"></span>
                <ul>
                    <li>
                        <a href="https://www.icloud.com/shortcuts/f154d368bd4d4c27a22ea352d4e1b366" target="_blank">
                            <span data-i18n="shortcut1Text"></span>
                        </a>
                    </li>
                    <li>
                        <a href="https://www.icloud.com/shortcuts/77641f10db854a2aafb9872c58cd2d8c" target="_blank">
                            <span data-i18n="shortcut2Text"></span>
                        </a>
                        <span data-i18n="noteSmart"></span>
                    </li>
                </ul>
            </li>
            <li data-i18n="step2"></li>
            <li data-i18n="step3"></li>
            <li data-i18n="step4"></li>
            <li data-i18n="step5"></li>
            <li data-i18n="step6"></li>
            <li data-i18n="step7"></li>
            <li data-i18n="step8"></li>
        </ol>
        <hr>
        <p class="note" data-i18n="actionNote"></p>
    </div>
</body>
</html>
