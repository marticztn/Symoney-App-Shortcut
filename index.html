<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symoney Guide</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #93c5fd;
            --text: #334155;
            --background: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        
        .language-selector {
            margin-bottom: 1.5rem;
        }
        
        .language-selector button {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            padding: 0.5rem 1rem;
            margin: 0 0.25rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .language-selector button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .language-selector button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .tab-container {
            width: 100%;
            max-width: 36rem;
            margin-bottom: 1.5rem;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }
        
        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            color: var(--text);
            font-weight: 500;
            opacity: 0.7;
        }
        
        .tab:hover {
            opacity: 1;
        }
        
        .tab.active {
            opacity: 1;
        }
        
        .tab::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--primary);
            transform: scaleX(0);
            transition: var(--transition);
        }
        
        .tab.active::after {
            transform: scaleX(1);
        }
        
        .card {
            background: var(--card);
            width: 100%;
            max-width: 36rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.5s ease forwards;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text);
            text-align: center;
        }
        
        ol {
            list-style-position: inside;
            margin-bottom: 1.5rem;
        }
        
        ol > li {
            margin-bottom: 1rem;
            padding-left: 0.5rem;
            animation: slideIn 0.5s ease;
            animation-fill-mode: both;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        ol > li:nth-child(1) { animation-delay: 0.1s; }
        ol > li:nth-child(2) { animation-delay: 0.2s; }
        ol > li:nth-child(3) { animation-delay: 0.3s; }
        ol > li:nth-child(4) { animation-delay: 0.4s; }
        ol > li:nth-child(5) { animation-delay: 0.5s; }
        ol > li:nth-child(6) { animation-delay: 0.6s; }
        ol > li:nth-child(7) { animation-delay: 0.7s; }
        ol > li:nth-child(8) { animation-delay: 0.8s; }
        
        ul {
            list-style-type: none;
            margin: 0.75rem 0 0.75rem 1.5rem;
        }
        
        ul > li {
            margin-bottom: 0.5rem;
            position: relative;
        }
        
        ul > li:before {
            content: "•";
            color: var(--primary);
            font-weight: bold;
            display: inline-block;
            width: 1rem;
            margin-left: -1rem;
        }
        
        a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.5rem 0;
        }
        
        .note {
            font-size: 0.875rem;
            text-align: center;
            color: var(--text);
            opacity: 0.8;
        }
        
        .api-key-example {
            background-color: #f1f5f9;
            border-radius: 0.375rem;
            padding: 1rem;
            margin: 1rem 0;
            font-family: monospace;
            overflow-x: auto;
            transition: var(--transition);
        }
        
        .api-key-example:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .button {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 0.625rem 1.25rem;
            border-radius: 0.375rem;
            text-decoration: none;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        
        .button:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
            text-decoration: none;
        }
        
        .copy-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        
        .copy-notification.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
    <script>

        function changeLanguage(lang) {
          const dict = translations[lang];
          
          // Update text translations
          document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (dict[key]) {
              el.textContent = dict[key];
            }
          });
          
          // Update active language button
          document.querySelectorAll('.language-selector button').forEach(button => {
            button.classList.remove('active');
          });
          document.querySelector(`.language-selector button[onclick="changeLanguage('${lang}')"]`).classList.add('active');
        }
        
        function switchTab(tabName) {
            // Update active tab
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
            
            // Update active content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelector(`.tab-content[data-tab="${tabName}"]`).classList.add('active');
            
            // Animate new content
            const activeContent = document.querySelector(`.tab-content[data-tab="${tabName}"]`);
            activeContent.style.animation = 'none';
            activeContent.offsetHeight; // Trigger reflow
            activeContent.style.animation = 'fadeIn 0.5s ease forwards';
            
            // Animate list items
            const listItems = activeContent.querySelectorAll('ol > li');
            listItems.forEach((item, index) => {
                item.style.animation = 'none';
                item.offsetHeight; // Trigger reflow
                item.style.animation = `slideIn 0.5s ease both ${0.1 * (index + 1)}s`;
            });
        }
        
        function copyExample() {
            const exampleText = "sk_symoney_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx";
            navigator.clipboard.writeText(exampleText).then(() => {
                const notification = document.getElementById('copyNotification');
                notification.classList.add('show');
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 2000);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
          changeLanguage('zh-cn');
          switchTab('quickRecord');
        });
    </script>
</head>
<body>
    <div class="language-selector">
        <button onclick="changeLanguage('en')">English</button>
        <button onclick="changeLanguage('zh-cn')" class="active">简体中文</button>
        <button onclick="changeLanguage('zh-tw')">繁體中文</button>
    </div>
    
    <h1 data-i18n="title"></h1>
    
    <div class="tab-container">
        <div class="tabs">
            <div class="tab active" data-tab="quickRecord" onclick="switchTab('quickRecord')">
                <span data-i18n="quickRecordTab"></span>
            </div>
            <div class="tab" data-tab="apiKey" onclick="switchTab('apiKey')">
                <span data-i18n="apiKeyTab"></span>
            </div>
        </div>
    </div>

    <div class="card tab-content active" data-tab="quickRecord">
        <h1 data-i18n="quickRecordTitle"></h1>
        <ol>
            <li>
                <span data-i18n="step1"></span>

                        <a href="https://www.icloud.com/shortcuts/f154d368bd4d4c27a22ea352d4e1b366" target="_blank">

                        </a>
                    </li>

                        <a href="https://www.icloud.com/shortcuts/77641f10db854a2aafb9872c58cd2d8c" target="_blank">

                    </li>

            <li data-i18n="step6"></li>
            <li data-i18n="step7"></li>
            <li data-i18n="step8"></li>

    <div class="card tab-content" data-tab="apiKey">

            <li data-i18n="apiStep1"></li>

    </div>
</body>
